<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uma prévia preparada para Nutrate - Nutrition and Internal Medicine</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Inter, -apple-system, sans-serif; background: #FAF7F2; color: #1A1A1A; padding: 24px 16px 48px; }
  .wrap { max-width: 480px; margin: 0 auto; }
  .marca { text-align: center; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: #1F3A34; font-weight: 700; margin-bottom: 24px; }
  h1 { font-size: 22px; line-height: 1.3; margin-bottom: 12px; color: #1F3A34; }
  p.intro { font-size: 15px; line-height: 1.5; color: #444; margin-bottom: 24px; }
  .ba-slider { position: relative; width: 100%; aspect-ratio: 9 / 16; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.12); background: #eee; touch-action: pan-y; }
  .ba-slider img, .ba-slider iframe { width: 100%; height: 100%; object-fit: cover; display: block; border: 0; }
  .ba-after { position: absolute; inset: 0; }
  .ba-before { position: absolute; inset: 0; overflow: hidden; }
  .ba-fallback { display:flex; align-items:center; justify-content:center; height:100%; font-size:13px; color:#999; text-align:center; padding: 24px; }
  .ba-range { position: absolute; inset: 0; width: 100%; height: 100%; margin: 0; opacity: 0; cursor: ew-resize; z-index: 3; }
  .ba-handle { position: absolute; top: 50%; width: 40px; height: 40px; margin-left: -20px; margin-top: -20px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.25); pointer-events: none; z-index: 2; left: 50%; }
  .ba-divider { position: absolute; top: 0; bottom: 0; width: 3px; background: #fff; margin-left: -1.5px; left: 50%; pointer-events: none; z-index: 2; }
  .ba-label { position: absolute; top: 12px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; background: rgba(26,26,26,0.6); color: #fff; padding: 4px 10px; border-radius: 20px; z-index: 2; }
  .ba-label-before { left: 12px; }
  .ba-label-after { right: 12px; }
  .cta { display: block; text-align: center; background: #1F3A34; color: #fff; text-decoration: none; padding: 16px; border-radius: 12px; font-weight: 600; margin-top: 28px; font-size: 15px; }
  .rodape { text-align: center; font-size: 12px; color: #999; margin-top: 20px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="marca">RD Exclusive</div>
    <h1>Preparamos uma prévia especialmente para Nutrate - Nutrition and Internal Medicine</h1>
    <p class="intro">Arraste o comparador abaixo pra ver como está hoje e como poderia ficar. Sem compromisso — é só um protótipo.</p>
    <div class="ba-slider">
      <div class="ba-after"><img src="img/depois.jpg" alt="Novo site proposto"></div>
      <div class="ba-before" id="baBefore"><img src="img/antes.jpg" alt="Site anterior"></div>
      <div class="ba-divider" id="baDivider"></div>
      <div class="ba-handle" id="baHandle">↔</div>
      <input type="range" min="0" max="100" value="50" class="ba-range" id="baRange" aria-label="Arraste para comparar antes e depois">
      <span class="ba-label ba-label-before">ANTES</span>
      <span class="ba-label ba-label-after">DEPOIS</span>
    </div>
    <a class="cta" href="https://rd-previews-dharari01s-projects.vercel.app/nutrate---nutrition-and-internal-medicine/index.html" target="_blank" rel="noopener">Ver o site completo</a>
    <p class="rodape">RD Exclusive · 2026</p>
  </div>
  <script>
    var range = document.getElementById("baRange");
    var before = document.getElementById("baBefore");
    var handle = document.getElementById("baHandle");
    var divider = document.getElementById("baDivider");
    function atualizar(v) {
      before.style.clipPath = "inset(0 " + (100 - v) + "% 0 0)";
      handle.style.left = v + "%";
      divider.style.left = v + "%";
    }
    range.addEventListener("input", function(e) { atualizar(e.target.value); });
    atualizar(50);
  </script>
</body>
</html>
